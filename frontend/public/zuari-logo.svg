<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50">
  <rect x="0" y="0" width="180" height="50" rx="8" ry="8" fill="#ffffff"/>
  <!-- Z arrow mark -->
  <g transform="translate(10, 5)">
    <!-- Top bar of Z - red/orange gradient -->
    <polygon points="5,8 30,8 25,14 8,14" fill="#e53935"/>
    <!-- Diagonal of Z - green -->
    <polygon points="25,14 12,32 18,32 30,14" fill="#43a047"/>
    <!-- Bottom bar of Z - blue -->
    <polygon points="8,32 30,32 28,38 5,38" fill="#1e88e5"/>
    <!-- Arrow tip -->
    <polygon points="30,18 38,23 30,28" fill="#ff7d20"/>
  </g>
  <!-- Text -->
  <text x="55" y="24" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="16" font-weight="900" fill="#1b3a8b" letter-spacing="0.5">ZUARI</text>
  <text x="55" y="40" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="7" font-weight="700" fill="#1b3a8b" letter-spacing="2.5">INDUSTRIES</text>
</svg>